name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Dockerfile.prod -t django-tdd-docker:latest .

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: movies
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: runner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://runner:runner@localhost:5432/movies
      SECRET_KEY: test-secret-key
      DEBUG: 0
      DJANGO_ALLOWED_HOSTS: localhost
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -r app/requirements.txt
      - name: Run pytest
        run: |
          cd app
          pytest -p no:warnings --cov=.
      - name: Run flake8
        run: |
          cd app
          flake8 .
      - name: Run black
        run: |
          cd app
          black --check --exclude="migrations|env" .
      - name: Run isort
        run: |
          cd app
          isort . --check-only
